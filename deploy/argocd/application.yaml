# GitOps owner: ArgoCD continuously reconciles the cluster to match this Git
# path. When CI bumps the image tag in deploy/k8s/rollout.yaml, ArgoCD syncs
# the change, which triggers the Argo Rollouts SLO-gated canary automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/example/slo-canary-platform.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: checkout
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        maxDuration: 2m
        factor: 2
