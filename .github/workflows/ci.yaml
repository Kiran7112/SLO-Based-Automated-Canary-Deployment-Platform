name: ci

# Build, test, scan, sign and publish the checkout image, then let ArgoCD /
# Argo Rollouts pick up the new tag and drive the SLO-gated canary.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}/checkout
  REGISTRY: ghcr.io

jobs:
  test:
    name: Build & unit test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy        # resolves/commits go.sum on first CI run
      - run: go vet ./...
      - run: go test ./... -race -count=1

  scan:
    name: Trivy image scan (DevSecOps gate)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image (local, for scanning)
        run: docker build -t "${IMAGE}:${GITHUB_SHA}" .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"            # fail the pipeline on findings
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: security/trivy/.trivyignore

  publish:
    name: Push & sign image
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write              # for keyless cosign signing
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
      - uses: sigstore/cosign-installer@v3
      - name: Sign the published image
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

  promote:
    name: Bump GitOps manifest (triggers rollout)
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Pin new image tag in the Rollout manifest
        run: |
          NEW_TAG="${GITHUB_REF_NAME}"
          sed -i "s#\(image: .*checkout\):.*#\1:${NEW_TAG}#" deploy/k8s/rollout.yaml
      - name: Commit manifest bump for ArgoCD to sync
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git commit -am "chore(release): roll out ${GITHUB_REF_NAME}" || echo "no changes"
          git push
