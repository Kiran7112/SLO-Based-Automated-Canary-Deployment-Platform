# Secrets are committed only in encrypted (Sealed) form. The Sealed Secrets
# controller in-cluster decrypts this into a regular Secret that Alertmanager
# mounts for its Slack webhook URL. The encryptedData below is a placeholder —
# regenerate with:
#
#   kubectl create secret generic alertmanager-slack \
#     --from-literal=slack-webhook-url='https://hooks.slack.com/services/XXX' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system -o yaml > sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
spec:
  encryptedData:
    slack-webhook-url: AgB<placeholder-ciphertext-replace-with-kubeseal-output>
  template:
    metadata:
      name: alertmanager-slack
      namespace: monitoring
    type: Opaque
