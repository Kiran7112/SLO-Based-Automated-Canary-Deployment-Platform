# Routes SLO breach alerts to the on-call Slack channel. The webhook URL is
# injected from a Sealed Secret (security/secrets/sealed-secret.yaml) — never
# committed in plaintext.
global:
  resolve_timeout: 1m

route:
  receiver: slack-oncall
  group_by: [alertname, slo]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: slack-oncall
      continue: false

receivers:
  - name: slack-oncall
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
        channel: "#sre-oncall"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: >-
          *{{ .CommonLabels.alertname }}* ({{ .CommonLabels.slo }})
          {{ range .Alerts }}{{ .Annotations.description }}
          {{ end }}
